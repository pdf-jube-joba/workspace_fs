<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="./md_preview.css">
  <link rel="stylesheet" href="./markdown_content.css">
  <link rel="stylesheet" href="./vendor/katex/katex.min.css">
</head>
<body>
  <main class="app">
    <section class="topbar">
      <section class="nav-panel">
        <div class="nav-actions">
          <a id="home-link" class="status-action-link" href="/">Home</a>
          <a id="up-link" class="status-action-link" href="/">Up</a>
        </div>
      </section>
    </section>

    <div class="workspace">
      <aside id="sidebar" class="sidebar-pane" aria-label="Navigation sidebar">
        <div class="sidebar-header">
          <h1>Navigation</h1>
        </div>
        <nav id="navigation" class="surface navigation"></nav>
      </aside>

      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        type="button"
        aria-controls="sidebar"
        aria-expanded="false"
        aria-label="Hide navigation"
      >
        ◂
      </button>

      <section class="content-pane">
        <section class="statusbar">
          <div class="status-actions">
            <a id="edit-link" class="status-action-link" href="/">Edit</a>
          </div>
          <div class="status-body">
            <div class="status-label">PATH</div>
            <div id="path-text" class="status-path"></div>
            <div id="status-text" class="status-text">Loading ...</div>
          </div>
        </section>

        <section class="pane preview-pane">
          <h1>Preview</h1>
          <div id="preview" class="surface"></div>
        </section>
      </section>
    </div>
  </main>

  <script type="module" src="./md_preview.js"></script>
</body>
</html>
